name = "snapog"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "snapog-db"
database_id = "placeholder-set-after-wrangler-d1-create"

[[r2_buckets]]
binding = "OG_CACHE"
bucket_name = "snapog-og-cache"

[vars]
ENVIRONMENT = "development"
# Set AUTH_SECRET via `wrangler secret put AUTH_SECRET` for dashboard cookie signing

[env.staging]
name = "snapog-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[env.production]
name = "snapog"
[env.production.vars]
ENVIRONMENT = "production"
