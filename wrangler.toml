name = "ogstamp"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "ogstamp-db"
database_id = "bfad2555-2cc2-4fff-9ec1-da7aad5d92b5"

[[r2_buckets]]
binding = "OG_CACHE"
bucket_name = "ogstamp-og-cache"

[vars]
ENVIRONMENT = "development"
# Set AUTH_SECRET via `wrangler secret put AUTH_SECRET` for dashboard cookie signing

[env.staging]
name = "ogstamp-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[env.production]
name = "ogstamp"
[env.production.vars]
ENVIRONMENT = "production"
