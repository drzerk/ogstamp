# Dogfooding: OGStamp checks its own social cards with its own action.
# If our landing page ever ships without a working card again, this goes red.

name: og-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  unit:
    name: parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --test action/test/ogcheck.test.js

  cards:
    name: live social cards
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Check our own pages
        uses: ./action
        with:
          urls: |
            https://ogstamp.drzerk88.workers.dev/
            https://ogstamp.drzerk88.workers.dev/register
          fail-on: fail
          github-token: ${{ secrets.GITHUB_TOKEN }}

  published:
    # The job above tests the working tree. This one tests what a stranger
    # actually gets from `uses: drzerk/ogstamp/action@v1` — a released tag that
    # does not resolve, or resolves to a broken tree, is the difference between
    # a published action and a directory nobody can run.
    name: released v1 tag resolves and runs
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Run the action as a consumer would
        uses: drzerk/ogstamp/action@v1
        with:
          urls: https://ogstamp.drzerk88.workers.dev/
          fail-on: fail
          comment: 'false'
