# Dogfooding: OGStamp checks its own social cards with its own action.
# If our landing page ever ships without a working card again, this goes red.

name: og-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  unit:
    name: parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --test action/test/ogcheck.test.js

  cards:
    name: live social cards
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Check our own pages
        uses: ./action
        with:
          urls: |
            https://ogstamp.drzerk88.workers.dev/
            https://ogstamp.drzerk88.workers.dev/register
          fail-on: fail
          github-token: ${{ secrets.GITHUB_TOKEN }}
